<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Assessment Agent</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🩺 Diabetes Risk Assessment Agent</h1>

    <h3>Patient Information</h3>

    <form action="/predict" method="POST">

        <label>Patient Name</label>
        <input type="text" name="name" required>

        <label>Pregnancies</label>
        <input type="number" name="pregnancies" min="0" required>

        <label>Glucose</label>
        <input type="number" step="0.01" name="glucose" required>

        <label>Blood Pressure</label>
        <input type="number" step="0.01" name="blood_pressure" required>

        <label>Skin Thickness</label>
        <input type="number" step="0.01" name="skin_thickness" required>

        <label>Insulin</label>
        <input type="number" step="0.01" name="insulin" required>

        <label>BMI</label>
        <input type="number" step="0.01" name="bmi" required>

        <label>Diabetes Pedigree Function</label>
        <input type="number" step="0.001" name="diabetes_pedigree" required>

        <label>Age</label>
        <input type="number" name="age" required>

        <button type="submit">
            Predict Diabetes Risk
        </button>

    </form>

    <br>

    <a href="/history">
        <button>View Patient History</button>
    </a>

</div>

</body>
</html>
